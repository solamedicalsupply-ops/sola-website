name: Auto SEO Blog Post
 
on:
  schedule:
    # Runs Mon & Thu at 1:00 AM UTC = 8:00 AM UTC+7 (Vietnam/Malaysia time)
    - cron: '0 1 * * 1,4'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI
 
jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install anthropic
 
      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py
 
      - name: Commit and push new post
        run: |
          git config user.name "SOLA Blog Bot"
          git config user.email "bot@solamedicalsupply.com"
          git add blog/ data/keywords.json
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "Auto: new SEO blog post [skip ci]" && git push)